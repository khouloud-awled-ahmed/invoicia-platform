<VirtualHost *:80>
    ServerName invoicia.local
    ServerAlias www.invoicia.local
    
    # Document Root - Frontend React (fichiers statiques après build)
    DocumentRoot /var/www/invoicia/build
    
    <Directory /var/www/invoicia/build>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # React Router - Rediriger toutes les routes vers index.html
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>
    
    # Proxy vers l'API NestJS (Backend)
    ProxyPreserveHost On
    ProxyRequests Off
    
    # Proxy pour toutes les requêtes API vers NestJS (port 3000)
    <Location /api>
        ProxyPass http://localhost:3000/api
        ProxyPassReverse http://localhost:3000/api
        
        # Headers pour le proxy
        RequestHeader set X-Forwarded-Proto "http"
        RequestHeader set X-Forwarded-Host "invoicia.local"
    </Location>
    
    # Proxy pour le websocket si nécessaire (ex: HMR en dev)
    <Location /socket.io>
        ProxyPass http://localhost:3000/socket.io
        ProxyPassReverse http://localhost:3000/socket.io
    </Location>
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/invoicia_error.log
    CustomLog ${APACHE_LOG_DIR}/invoicia_access.log combined
</VirtualHost>

